# ~/.tmux.conf — vim-style tmux
#
# Reload after edits with `prefix r` (set up below) or `tmux source ~/.tmux.conf`.

# ─── General ──────────────────────────────────────────────────────────────────

# Truecolor (wezterm + most modern terms support it).
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# Use the login shell that started tmux (zsh on this machine).
set -g default-shell "$SHELL"

# Mouse: scroll history, click panes/windows, drag-resize splits.
set -g mouse on

# 50k lines of scrollback per pane.
set -g history-limit 50000

# Snappy command sequences (default 500ms makes Esc feel laggy in vim).
set -sg escape-time 10

# 1-indexed windows and panes (so prefix-1 is the leftmost — matches the keyboard).
set -g base-index 1
setw -g pane-base-index 1

# When you close a window, renumber the rest so there are no gaps.
set -g renumber-windows on

# Long-enough status refresh for clock / date display without thrashing.
set -g status-interval 5

# Activity highlight on background windows that produce output.
setw -g monitor-activity on
set -g visual-activity off

# ─── Pane navigation: vim hjkl ────────────────────────────────────────────────
# Conflict: prefix-l defaulted to `last-window`. Remapped below to prefix-Tab.

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Last-window now lives on prefix-Tab (vim-y: like switching tabs).
bind Tab last-window

# ─── Pane resize: vim HJKL (repeatable) ───────────────────────────────────────
# `-r` lets you hold the prefix and tap H/J/K/L several times in a row.
# Conflict: prefix-L defaulted to `switch-client -l`. Rarely used; overridden.

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Splits open in current pane's directory ──────────────────────────────────
# `|` for vertical (left/right), `-` for horizontal (top/bottom). The default
# `%` and `"` still work too — but these don't require shift juggling.

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── Window navigation: custom layout ─────────────────────────────────────────
# n = new, a = previous, b = next. Conflicts:
#   prefix n was `next-window` (default)        → moved to `prefix b`
#   prefix b was `send-prefix` (default)        → moved to `prefix C-b`
#   prefix c was `new-window`  (default+custom) → unbound (use `prefix n`)
#   prefix p was `previous-window` (default)    → unbound (use `prefix a`)

bind n new-window -c "#{pane_current_path}"
bind a previous-window
bind b next-window

unbind c
unbind p

bind C-b send-prefix

# ─── Vi copy mode ─────────────────────────────────────────────────────────────
# `prefix [` enters copy mode. `v` starts selection, `y` copies, `q` exits.
# On macOS, `y` pipes through pbcopy so the system clipboard gets it.

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Reload config ────────────────────────────────────────────────────────────

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ─── Status line — minimal, on top, no clutter ────────────────────────────────
# Comment this block out if you prefer tmux defaults.

set -g status-position top
set -g status-style "bg=default fg=default"
set -g status-left  "#[bold]#S #[default]"
set -g status-right "#[fg=brightblack]%a %b %d  %H:%M"
set -g status-left-length 40
setw -g window-status-style         "fg=brightblack"
setw -g window-status-format        " #I:#W "
setw -g window-status-current-style "bg=blue,fg=black,bold"
setw -g window-status-current-format " #I:#W "
